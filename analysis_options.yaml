# Static analysis configuration. See https://dart.dev/tools#ides-and-editors.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/generated/**"
  errors:
    # Freezed places some annotations on generated members; not actionable in hand code.
    invalid_annotation_target: ignore

linter:
  rules:
    prefer_const_constructors: true
    prefer_const_declarations: true
    require_trailing_commas: true
    sort_child_properties_last: true
